<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Tube Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Control Panel */
        .controls { width: 100%; background: #2c3e50; color: white; padding: 20px; display: flex; gap: 30px; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 10; }
        .reset-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .reset-btn:hover { background: #c0392b; }
        
        /* Tube Grid */
        .game-container { display: flex; gap: 4px; padding: 40px 10px; align-items: flex-end; }
        .column { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        
        .value-label { font-size: 10px; color: #7f8c8d; height: 15px; }
        
        /* The Fixed Frame */
        .tube-frame { 
            width: 25px; 
            height: 500px; 
            background: white; 
            border: 1px solid #bdc3c7; 
            position: relative; 
            overflow: hidden; /* This keeps the "liquid" inside the box */
        }
        
        /* The Scaling Content */
        .liquid { 
            width: 100%; 
            background: #3498db; 
            position: absolute; 
            bottom: 0; 
            transition: height 0.2s ease-out; /* Smooth scaling */
        }
        
        .add-btn { width: 30px; cursor: pointer; }
        .id-label { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="controls">
    <button class="reset-btn" onclick="handleReset()">RESET ALL</button>
    <div>
        <label>Content Y-Scale: </label>
        <input type="range" id="scaleSlider" min="0.1" max="10" step="0.1" value="1" oninput="updateAllVisuals()">
        <span id="scaleVal">1.0</span>
    </div>
</div>

<div class="game-container" id="gameContainer">
    </div>

<script>
    const minTube = 6;
    const maxTube = 36;
    let tubeData = {};
    let resetStep = 0;

    // Initialize Data
    for (let i = minTube; i <= maxTube; i++) {
        tubeData[i] = 0;
    }

    const container = document.getElementById('gameContainer');

    // Create the UI
    function init() {
        for (let i = minTube; i <= maxTube; i++) {
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `
                <div class="value-label" id="val-${i}">0</div>
                <div class="tube-frame">
                    <div class="liquid" id="liquid-${i}" style="height: 0px;"></div>
                </div>
                <button class="add-btn" onclick="increment(${i})">+</button>
                <div class="id-label">${i}</div>
            `;
            container.appendChild(col);
        }
    }

    function increment(id) {
        tubeData[id] += 10;
        updateVisual(id);
    }

    function updateVisual(id) {
        const multiplier = document.getElementById('scaleSlider').value;
        const liquid = document.getElementById(`liquid-${id}`);
        const label = document.getElementById(`val-${id}`);
        
        document.getElementById('scaleVal').innerText = multiplier;
        
        // Logical Value * Multiplier = Visual Height
        let visualHeight = tubeData[id] * multiplier;
        
        // Apply to style
        liquid.style.height = visualHeight + 'px';
        label.innerText = tubeData[id];
    }

    function updateAllVisuals() {
        for (let i = minTube; i <= maxTube; i++) {
            updateVisual(i);
        }
    }

    // Triple Reset Logic
    function handleReset() {
        const messages = [
            "Reset all tubes?",
            "Are you really sure?",
            "Final warning: Wipe everything?"
        ];

        if (confirm(messages[resetStep])) {
            resetStep++;
            if (resetStep > 2) {
                performReset();
                resetStep = 0;
            } else {
                handleReset(); // Call next confirmation
            }
        } else {
            resetStep = 0; // User cancelled
        }
    }

    function performReset() {
        for (let i = minTube; i <= maxTube; i++) {
            tubeData[i] = 0;
            updateVisual(i);
        }
    }

    init();
</script>

</body>
</html>
